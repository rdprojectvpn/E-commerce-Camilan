<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - FoodTech App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            theme: { extend: { colors: { primary: '#ea580c', dark: '#1e293b', light: '#f8fafc', flash: '#e11d48' } } } 
        }
    </script>
</head>
<body class="bg-light font-sans pb-24">

    <header class="bg-white p-5 sticky top-0 z-20 shadow-sm border-b border-gray-100">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-dark tracking-tight">SpicyBites.</h1>
                <p id="lokasi-terpilih" class="text-xs text-gray-500 mt-0.5"><span class="text-primary">📍</span> Memuat...</p>
            </div>
            <div class="flex gap-2">
                <button onclick="bukaModalAdmin()" class="bg-dark text-white p-3 rounded-full hover:bg-gray-800 transition text-sm flex items-center justify-center w-10 h-10 shadow-md">
                    ⚙️
                </button>
                <a href="cart.html" class="relative bg-gray-50 p-3 rounded-full hover:bg-gray-100 transition flex items-center justify-center w-10 h-10 shadow-sm">
                    <span>🛒</span>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-primary text-white text-xs font-bold px-1.5 py-0.5 rounded-full shadow-md">0</span>
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto mt-4">
        
        <div class="px-4 mb-6">
            <div class="bg-gradient-to-r from-flash to-orange-500 rounded-2xl p-4 text-white shadow-lg">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="font-bold text-lg flex items-center gap-1">⚡ Flash Sale</h2>
                    <div class="bg-white/20 px-2 py-1 rounded text-sm font-bold tracking-widest backdrop-blur-sm" id="flash-timer">
                        00:00:00
                    </div>
                </div>
                <div class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide">
                    <div class="bg-white text-dark rounded-xl p-2 min-w-[140px] shadow-sm flex-shrink-0">
                        <div class="h-20 bg-red-50 rounded-lg flex items-center justify-center text-4xl mb-2">🔥</div>
                        <h3 class="font-bold text-xs">Mie Iblis Level 8</h3>
                        <div class="flex items-end gap-1 mt-1">
                            <p class="text-flash font-black text-sm">Rp 9.000</p>
                            <p class="text-[10px] text-gray-400 line-through">15.000</p>
                        </div>
                        <button onclick="bukaModal('Mie Iblis Lvl 8 (Flash Sale)', 9000, '🔥')" class="w-full bg-flash text-white text-[11px] font-bold py-1.5 rounded mt-2">Sikat!</button>
                    </div>
                    <div class="bg-white text-dark rounded-xl p-2 min-w-[140px] shadow-sm flex-shrink-0">
                        <div class="h-20 bg-orange-50 rounded-lg flex items-center justify-center text-4xl mb-2">🍹</div>
                        <h3 class="font-bold text-xs">Es Setan Merah</h3>
                        <div class="flex items-end gap-1 mt-1">
                            <p class="text-flash font-black text-sm">Rp 4.000</p>
                            <p class="text-[10px] text-gray-400 line-through">8.000</p>
                        </div>
                        <button onclick="bukaModal('Es Setan Merah (Flash Sale)', 4000, '🍹')" class="w-full bg-flash text-white text-[11px] font-bold py-1.5 rounded mt-2">Sikat!</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="px-4 mb-4 flex overflow-x-auto gap-3 pb-2 scrollbar-hide">
            <button onclick="renderMenu('semua')" class="kategori-btn bg-dark text-white px-4 py-1.5 rounded-full text-sm font-semibold whitespace-nowrap">Semua</button>
            <button onclick="renderMenu('mie')" class="kategori-btn bg-white text-gray-600 border border-gray-200 px-4 py-1.5 rounded-full text-sm font-semibold whitespace-nowrap">🍜 Mie</button>
            <button onclick="renderMenu('dimsum')" class="kategori-btn bg-white text-gray-600 border border-gray-200 px-4 py-1.5 rounded-full text-sm font-semibold whitespace-nowrap">🥟 Dimsum</button>
            <button onclick="renderMenu('minuman')" class="kategori-btn bg-white text-gray-600 border border-gray-200 px-4 py-1.5 rounded-full text-sm font-semibold whitespace-nowrap">🍹 Minuman</button>
        </div>

        <h2 class="px-4 font-bold text-dark mb-3">Menu Utama</h2>
        <div id="product-container" class="grid grid-cols-2 gap-4 px-4"></div>

    </main>

    <div id="modal-opsi" class="fixed inset-0 bg-dark bg-opacity-70 hidden items-end justify-center z-50 backdrop-blur-sm transition-all">
        <div class="bg-white w-full max-w-md rounded-t-3xl p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-5">
                <h3 id="modal-nama-menu" class="text-xl font-bold text-dark">Nama Menu</h3>
                <button onclick="tutupModalOpsi()" class="text-gray-400 font-bold text-2xl hover:text-red-500">&times;</button>
            </div>
            <p class="text-sm text-gray-500 mb-3 font-medium">Tentukan tingkat kepedasan Anda:</p>
            <div class="grid grid-cols-4 gap-3 mb-6" id="level-container"></div>
            <button onclick="tambahKeKeranjang()" class="w-full bg-primary text-white font-bold py-3.5 rounded-xl">Tambahkan ke Pesanan</button>
        </div>
    </div>

    <div id="modal-admin" class="fixed inset-0 bg-dark bg-opacity-70 hidden items-center justify-center z-50 backdrop-blur-sm p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-dark">⚙️ Tambah Menu Baru</h3>
                <button onclick="tutupModalAdmin()" class="text-gray-400 font-bold text-xl hover:text-red-500">&times;</button>
            </div>
            <form id="form-tambah-produk" onsubmit="simpanProdukBaru(event)">
                <div class="space-y-3">
                    <div>
                        <label class="text-xs font-bold text-gray-600">Nama Menu</label>
                        <input type="text" id="input-nama" required class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:border-primary outline-none" placeholder="Cth: Mie Setan">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-600">Harga (Rp)</label>
                        <input type="number" id="input-harga" required class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:border-primary outline-none" placeholder="Cth: 15000">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-xs font-bold text-gray-600">Kategori</label>
                            <select id="input-kategori" class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:border-primary outline-none">
                                <option value="mie">Mie</option>
                                <option value="dimsum">Dimsum</option>
                                <option value="minuman">Minuman</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-600">Ikon (Emoji)</label>
                            <input type="text" id="input-ikon" required class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:border-primary outline-none" placeholder="Cth: 🍜">
                        </div>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-600">Deskripsi Singkat</label>
                        <input type="text" id="input-deskripsi" required class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:border-primary outline-none" placeholder="Penjelasan singkat...">
                    </div>
                </div>
                <button type="submit" class="w-full bg-dark text-white font-bold py-3 rounded-xl mt-5 hover:bg-gray-800">Simpan Menu</button>
            </form>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. DATABASE PRODUK (LOCAL STORAGE)
        // ==========================================
        // Data bawaan jika LocalStorage masih kosong
        const dataBawaan = [
            { id: 1, kategori: 'mie', nama: 'Mie Pedas Nyakitin', harga: 13000, ikon: '🍜', deskripsi: 'Kenyal dengan taburan ayam cincang rahasia.' },
            { id: 2, kategori: 'dimsum', nama: 'Udang Keju Lumer', harga: 12000, ikon: '🍤', deskripsi: 'Keju mozarella dibalut adonan udang premium.' },
            { id: 3, kategori: 'minuman', nama: 'Es Teh Kampul', harga: 6000, ikon: '🍹', deskripsi: 'Teh manis segar perasan jeruk asli.' }
        ];

        // Ambil data dari memory browser, kalau kosong pakai dataBawaan
        let databaseProduk = JSON.parse(localStorage.getItem('ngegas_produk'));
        if (!databaseProduk) {
            databaseProduk = dataBawaan;
            localStorage.setItem('ngegas_produk', JSON.stringify(databaseProduk));
        }

        // ==========================================
        // 2. LOGIKA FITUR ADMIN (TAMBAH PRODUK)
        // ==========================================
        function bukaModalAdmin() { document.getElementById('modal-admin').classList.remove('hidden'); document.getElementById('modal-admin').classList.add('flex'); }
        function tutupModalAdmin() { document.getElementById('modal-admin').classList.add('hidden'); document.getElementById('modal-admin').classList.remove('flex'); }

        function simpanProdukBaru(event) {
            event.preventDefault(); // Cegah halaman reload
            
            // Ambil nilai dari inputan form
            const produkBaru = {
                id: Date.now(), // Bikin ID unik pakai waktu
                nama: document.getElementById('input-nama').value,
                harga: parseInt(document.getElementById('input-harga').value),
                kategori: document.getElementById('input-kategori').value,
                ikon: document.getElementById('input-ikon').value,
                deskripsi: document.getElementById('input-deskripsi').value
            };

            // Masukkan ke database array
            databaseProduk.push(produkBaru);
            
            // Simpan ke memory browser
            localStorage.setItem('ngegas_produk', JSON.stringify(databaseProduk));
            
            // Bersihkan form & tutup modal
            document.getElementById('form-tambah-produk').reset();
            tutupModalAdmin();
            
            // Render ulang layar
            renderMenu('semua');
            alert('Menu berhasil ditambahkan!');
        }

        // ==========================================
        // 3. RENDER MENU OTOMATIS
        // ==========================================
        const productContainer = document.getElementById('product-container');
        function renderMenu(filterKategori) {
            productContainer.innerHTML = ''; 
            
            document.querySelectorAll('.kategori-btn').forEach(btn => {
                btn.className = 'kategori-btn bg-white text-gray-600 border border-gray-200 px-4 py-1.5 rounded-full text-sm font-semibold whitespace-nowrap';
            });
            event.currentTarget.className = 'kategori-btn bg-dark text-white px-4 py-1.5 rounded-full text-sm font-semibold whitespace-nowrap';

            const produkDitampilkan = filterKategori === 'semua' 
                ? databaseProduk : databaseProduk.filter(item => item.kategori === filterKategori);

            produkDitampilkan.forEach(item => {
                const cardHtml = `
                <div class="bg-white rounded-2xl p-3 shadow-sm border border-gray-100 flex flex-col justify-between">
                    <div>
                        <div class="h-24 bg-gray-50 rounded-xl flex items-center justify-center text-4xl mb-2">${item.ikon}</div>
                        <h3 class="font-bold text-dark text-sm leading-tight">${item.nama}</h3>
                        <p class="text-[10px] text-gray-400 mt-1 line-clamp-2">${item.deskripsi}</p>
                    </div>
                    <div class="mt-3 flex items-center justify-between">
                        <p class="text-primary font-bold text-sm">Rp ${item.harga.toLocaleString('id-ID')}</p>
                        <button onclick="bukaModal('${item.nama}', ${item.harga}, '${item.ikon}')" class="bg-dark text-white w-7 h-7 rounded-full flex items-center justify-center hover:bg-primary text-lg font-bold">+</button>
                    </div>
                </div>`;
                productContainer.innerHTML += cardHtml;
            });
        }

        // ==========================================
        // 4. LOGIKA TIMER FLASH SALE
        // ==========================================
        function mulaiTimer() {
            // Set waktu berakhir (misal: 2 jam dari sekarang)
            let waktuBerakhir = new Date().getTime() + (2 * 60 * 60 * 1000); 

            let x = setInterval(function() {
                let sekarang = new Date().getTime();
                let selisih = waktuBerakhir - sekarang;

                let jam = Math.floor((selisih % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                let menit = Math.floor((selisih % (1000 * 60 * 60)) / (1000 * 60));
                let detik = Math.floor((selisih % (1000 * 60)) / 1000);

                // Format biar selalu 2 digit (contoh: 09:05:02)
                jam = jam < 10 ? "0" + jam : jam;
                menit = menit < 10 ? "0" + menit : menit;
                detik = detik < 10 ? "0" + detik : detik;

                document.getElementById("flash-timer").innerHTML = `${jam}:${menit}:${detik}`;

                if (selisih < 0) {
                    clearInterval(x);
                    document.getElementById("flash-timer").innerHTML = "BERAKHIR";
                }
            }, 1000);
        }

        // ==========================================
        // 5. LOGIKA KERANJANG & LEVEL PEDAS
        // ==========================================
        let menuTerpilih = {};
        let keranjang = JSON.parse(localStorage.getItem('ngegas_cart')) || [];
        let outlet = localStorage.getItem('ngegas_outlet');
        
        if(!outlet) outlet = "Pusat"; // Fallback biar gak error pas testing
        document.getElementById('lokasi-terpilih').innerHTML = `<span class="text-primary">📍</span> ${outlet}`;

        function updateBadge() { document.getElementById('cart-count').innerText = keranjang.reduce((sum, item) => sum + item.qty, 0); }
        updateBadge();

        const levelContainer = document.getElementById('level-container');
        for(let i = 0; i <= 8; i++) {
            let btn = document.createElement('button');
            btn.className = `level-btn border border-gray-200 text-gray-600 rounded-xl py-2 text-sm font-bold`;
            btn.innerText = `Lv ${i}`;
            btn.onclick = () => {
                menuTerpilih.level = i;
                document.querySelectorAll('.level-btn').forEach(b => b.classList.replace('bg-primary', 'border-gray-200'));
                document.querySelectorAll('.level-btn').forEach(b => b.classList.replace('text-white', 'text-gray-600'));
                btn.classList.replace('border-gray-200', 'bg-primary');
                btn.classList.replace('text-gray-600', 'text-white');
            };
            levelContainer.appendChild(btn);
        }

        function bukaModal(nama, harga, ikon) {
            menuTerpilih = { nama, harga, ikon, level: null, qty: 1 };
            document.getElementById('modal-nama-menu').innerText = nama;
            document.getElementById('modal-opsi').classList.remove('hidden');
            document.getElementById('modal-opsi').classList.add('flex');
        }

        function tutupModalOpsi() {
            document.getElementById('modal-opsi').classList.add('hidden');
            document.getElementById('modal-opsi').classList.remove('flex');
        }

        function tambahKeKeranjang() {
            let butuhLevel = menuTerpilih.nama.toLowerCase().includes('mie');
            if(butuhLevel && menuTerpilih.level === null) { alert("Pilih level kepedasan!"); return; }
            if(!butuhLevel) menuTerpilih.level = "-";

            let index = keranjang.findIndex(i => i.nama === menuTerpilih.nama && i.level === menuTerpilih.level);
            if(index !== -1) keranjang[index].qty += 1;
            else keranjang.push(menuTerpilih);

            localStorage.setItem('ngegas_cart', JSON.stringify(keranjang));
            updateBadge();
            tutupModalOpsi();
        }

        // Mulai semuanya saat halaman siap
        window.onload = () => {
            renderMenu('semua');
            mulaiTimer();
        };
    </script>
</body>
</html>
