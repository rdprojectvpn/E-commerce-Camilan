<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang - Web App Mie Gacoan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: '#dc2626', accent: '#facc15' } } } }
    </script>
</head>
<body class="bg-gray-100 font-sans pb-32">

    <header class="bg-white text-gray-800 p-4 sticky top-0 z-10 shadow-sm flex items-center gap-3">
        <a href="index.html" class="text-2xl font-bold">&larr;</a>
        <h1 class="text-xl font-bold">Keranjang Saya</h1>
    </header>

    <main class="max-w-md mx-auto px-4 mt-4">
        <p id="info-outlet" class="text-sm font-semibold text-brand mb-4 bg-red-100 p-2 rounded-lg text-center">📍 Pesanan untuk Cabang: -</p>
        
        <div id="cart-items-container" class="space-y-4">
            </div>

        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mt-6 mb-4">
            <h3 class="font-bold text-gray-800 mb-3 border-b pb-2">Rincian Pembayaran</h3>
            <div class="flex justify-between text-sm text-gray-600 mb-2"><span>Subtotal</span><span id="subtotal">Rp 0</span></div>
            <div class="flex justify-between text-sm text-gray-600 mb-2"><span>Pajak Resto (10%)</span><span id="pajak">Rp 0</span></div>
            <div class="flex justify-between font-bold text-gray-800 text-lg mt-3 pt-3 border-t"><span>Total</span><span id="total-akhir" class="text-brand">Rp 0</span></div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 z-20">
        <div class="max-w-md mx-auto flex items-center justify-between gap-4">
            <div class="flex flex-col">
                <span class="text-xs text-gray-500">Total Pembayaran</span>
                <span id="total-floating" class="font-bold text-brand text-lg">Rp 0</span>
            </div>
            <button onclick="prosesCheckout()" class="bg-brand text-white font-bold py-3 px-8 rounded-xl shadow-lg hover:bg-red-700 flex-1">Pesan & Bayar</button>
        </div>
    </div>

    <script>
        // Ambil data dari memory browser
        let keranjang = JSON.parse(localStorage.getItem('ngegas_cart')) || [];
        let outlet = localStorage.getItem('ngegas_outlet') || "Belum dipilih";
        
        document.getElementById('info-outlet').innerText = `📍 Pesanan untuk: Cabang ${outlet}`;

        function renderKeranjang() {
            const wadah = document.getElementById('cart-items-container');
            wadah.innerHTML = ''; // Bersihkan layar dulu

            if(keranjang.length === 0) {
                wadah.innerHTML = `<p class="text-center text-gray-500 py-10">Keranjang Anda masih kosong 😢<br><a href="index.html" class="text-brand font-bold mt-2 inline-block">Yuk pesan sekarang!</a></p>`;
            }

            keranjang.forEach((item, index) => {
                let htmlCard = `
                <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-200 flex gap-3">
                    <div class="w-16 h-16 bg-gray-100 rounded-lg flex items-center justify-center text-2xl">${item.ikon}</div>
                    <div class="flex-1">
                        <h3 class="font-bold text-gray-800 text-sm">${item.nama}</h3>
                        <p class="text-xs text-gray-500 mt-0.5">${item.level !== "-" ? "Level " + item.level : "Tanpa Level"}</p>
                        <p class="text-brand font-bold text-sm mt-1">Rp ${item.harga.toLocaleString('id-ID')}</p>
                    </div>
                    <div class="flex items-end">
                        <div class="flex items-center border border-gray-300 rounded-lg overflow-hidden">
                            <button onclick="ubahJumlah(${index}, -1)" class="px-3 py-1 bg-gray-50 text-gray-600">-</button>
                            <span class="px-2 text-sm font-bold text-gray-800">${item.qty}</span>
                            <button onclick="ubahJumlah(${index}, 1)" class="px-3 py-1 bg-gray-50 text-brand">+</button>
                        </div>
                    </div>
                </div>`;
                wadah.innerHTML += htmlCard;
            });

            hitungTotalBiaya();
        }

        function ubahJumlah(index, nilai) {
            keranjang[index].qty += nilai;
            
            // Jika jumlah 0, hapus dari keranjang
            if(keranjang[index].qty < 1) {
                if(confirm("Hapus menu ini?")) {
                    keranjang.splice(index, 1); // Hapus item dari array
                } else {
                    keranjang[index].qty = 1; // Batal hapus, kembalikan ke 1
                }
            }
            
            // Simpan perubahan ke database browser dan muat ulang layar
            localStorage.setItem('ngegas_cart', JSON.stringify(keranjang));
            renderKeranjang();
        }

        function hitungTotalBiaya() {
            let subtotal = keranjang.reduce((total, item) => total + (item.harga * item.qty), 0);
            let pajak = subtotal * 0.10;
            let totalAkhir = subtotal + pajak;

            document.getElementById('subtotal').innerText = `Rp ${subtotal.toLocaleString('id-ID')}`;
            document.getElementById('pajak').innerText = `Rp ${pajak.toLocaleString('id-ID')}`;
            document.getElementById('total-akhir').innerText = `Rp ${totalAkhir.toLocaleString('id-ID')}`;
            document.getElementById('total-floating').innerText = `Rp ${totalAkhir.toLocaleString('id-ID')}`;
        }

        function prosesCheckout() {
            if(keranjang.length === 0) return alert("Keranjang kosong!");
            alert(`Pesanan akan dikirim ke dapur Cabang ${outlet}!\nMohon siapkan pembayaran sebesar ${document.getElementById('total-akhir').innerText}`);
            localStorage.setItem('ngegas_cart', JSON.stringify([])); // Kosongkan keranjang setelah bayar
            window.location.href = 'index.html'; // Kembali ke menu
        }

        // Jalankan saat halaman dibuka
        renderKeranjang();
    </script>
</body>
</html>
